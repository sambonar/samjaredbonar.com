<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sam Bonar</title>
  <meta name="description" content="Sam Bonar — comedic civic strategist, electoral organizer, and community wealth builder, based in Washington, DC." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="directions/card-catalog.css">

  <style>
    :root { color-scheme: light; }
    html, body { margin: 0; padding: 0; }
    body { background: #f3ecdc; }
    @media print { * { color: #000; background: #fff; } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="content.js"></script>
  <script type="text/babel" src="directions/card-catalog.jsx"></script>

  <script type="text/babel">
    const ACCENT_HUE = 45;

    function App() {
      React.useEffect(() => {
        const style = document.getElementById("hue-override") || (() => {
          const s = document.createElement("style"); s.id = "hue-override"; document.head.appendChild(s); return s;
        })();
        style.textContent = `
          .dir-cardcatalog {
            --accent: oklch(0.52 0.14 ${ACCENT_HUE});
            --accent-soft: oklch(0.62 0.09 ${ACCENT_HUE});
            --stamp: oklch(0.48 0.16 ${(ACCENT_HUE - 20 + 360) % 360});
          }
        `;
      }, []);

      const CC = window.CardCatalog;
      return CC ? <CC /> : null;
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
